###############################################################################
# pnpm-workspace.yaml -- PNPM 11 Single-Project Supply-Chain Fortress
#
# Surface contract:
# - pnpm-workspace.yaml: repo-local non-sensitive PNPM policy
# - package.json: exact Node.js + pnpm toolchain pinning
# - .npmrc / auth.ini: auth-local tokens + certificates only
#
# IMPORTANT:
# There is intentionally NO `packages:` key in this file.
# In PNPM 11, omitting `packages` means the root project is the only workspace
# package. That is the correct single-project posture.
###############################################################################

########################################
# Supply-chain fortress posture
########################################

# `minimumReleaseAge`
# Simple: Delays the adoption of freshly published versions.
# Details: The Fortress baseline is 7 days, not 24 hours. The goal is maximum
# caution against compromised or retracted releases.
# Example: A version published today only becomes installable on the 8th day.
minimumReleaseAge: 10080

# `minimumReleaseAgeIgnoreMissingTime`
# Simple: Disables fail-open on missing publish time metadata.
# Details: If the registry does not supply a `time` value, resolution must
# fail rather than silently losing the protective effect.
# Example: A mirror without a `time` field blocks resolution until the issue is clarified.
minimumReleaseAgeIgnoreMissingTime: false

# `minimumReleaseAgeStrict`
# Simple: Enforces that PNPM aborts hard if versions are too young.
# Details: Without this setting, PNPM might fall back to an overly fresh version
# in case of doubt. This is unacceptable for Fortress governance.
# Example: If no version old enough matches, the install ends with an error.
minimumReleaseAgeStrict: true

# `minimumReleaseAgeExclude`
# Simple: Defines exceptions from the age gate.
# Details: In the Fortress baseline, the list remains explicitly empty so that no
# convenience approvals for "hot" releases are permitted.
# Example: `[]` signals that there are no approved immediate exceptions.
minimumReleaseAgeExclude: []

# `allowedDeprecatedVersions`
# Simple: Defines explicit exceptions for deprecated package versions.
# Details: The Fortress baseline keeps this map explicitly empty, so deprecated
# versions are not silently approved via implicit defaults.
# Example: `{}` means no deprecated version is approved.
allowedDeprecatedVersions: {}

# `trustPolicy`
# Simple: Blocks versions whose trust level has decreased compared to previous releases.
# Details: This reduces the risk of accidentally accepting a less trustworthy
# follow-up release.
# Example: A package with a trust downgrade will not be installed.
trustPolicy: no-downgrade

# `trustPolicyExclude`
# Simple: Defines exceptions from the trust policy.
# Details: The Fortress baseline intentionally sets an explicitly empty list here
# so that no hidden trust exceptions exist.
# Example: `[]` means that no package exception from the trust model is approved.
#
# Project exception note:
# We WANT to continue building the VSIX file in this repository.
# For that, we use `@vscode/vsce` as the packaging tool.
# As of the date of this comment, `25.05.2026`, `@vscode/vsce@3.9.1` is the
# current latest version and it still works with the transitive
# `semver@5.7.2` dependency in this packaging path.
# Therefore, we explicitly allow exactly this version here until the upstream
# packaging chain no longer requires it.
trustPolicyExclude:
  - 'semver@5.7.2'

# `blockExoticSubdeps`
# Simple: Forbids Git or tarball sources in transitive dependencies.
# Details: Only direct dependencies may use exotic sources; transitive
# sources must originate from controlled registries.
# Example: A transitive `https://...tgz` dependency is rejected.
blockExoticSubdeps: true

# `strictDepBuilds`
# Simple: Requires explicit decisions for dependency build scripts.
# Details: A new `postinstall` in a dependency must not run silently,
# but must be reviewed and approved.
# Example: A package with a new install script fails until evaluated in `allowBuilds`.
strictDepBuilds: true

# `allowBuilds`
# Simple: Defines the explicit allow/deny list for dependency build scripts.
# Details: An explicit allow-list is used instead of broad script execution.
# Example: `esbuild: true` allows `esbuild` later, `core-js: false` forbids `core-js`.
#
# Project exception note:
# We WANT to continue building the VSIX file locally in this repository
# with a bundle-first workflow.
# For that, we explicitly allow `esbuild` for bundling and the
# `@vscode/vsce-sign` build path used by the official `@vscode/vsce` packager.
allowBuilds:
  esbuild: true
  '@vscode/vsce-sign': true

# `dangerouslyAllowAllBuilds`
# Simple: Opens up blanket-wide build script execution.
# Details: In a Fortress architecture, this value always remains `false`.
# Example: `true` would be a deliberate security breach and is forbidden here.
dangerouslyAllowAllBuilds: false

########################################
# Registry and transport trust
########################################

# `registries`
# Simple: Pins the approved default package source.
# Details: In the absence of a reviewed internal registry, the official npm
# registry over HTTPS is the explicit fallback.
# Example: New resolutions use `https://registry.npmjs.org/` as the default source.
registries:
  default: https://registry.npmjs.org/

# `strictSsl`
# Simple: Enforces TLS certificate verification for registry access.
# Details: This is the minimum hardening against MITM and faulty certificate chains.
# Example: A registry with an invalid certificate will not be accepted.
strictSsl: true

########################################
# Toolchain enforcement
########################################

# `nodeVersion`
# Simple: Defines the engine baseline for dependency checks.
# Details: The major line intentionally remains on Node 26; the patch level is exact.
# Example: A dependency that requires Node 27 is rejected.
nodeVersion: 26.2.0

# `engineStrict`
# Simple: Makes engine checks hard instead of advisory.
# Details: This ensures no dependencies can be introduced that violate the
# approved runtime line.
# Example: A package with `engines.node: >=27` fails immediately.
engineStrict: true

# `pmOnFail`
# Simple: Aborts if the running pnpm version does not match exactly.
# Details: The Fortress posture is `error`, not `download`. The toolchain must
# be pre-provisioned and approved.
# Example: pnpm `11.1.0` is blocked against a repo with `11.2.2`.
pmOnFail: error

# `runtimeOnFail`
# Simple: Aborts if the declared runtime is not present or matching.
# Details: Here too, fail-closed applies instead of automatic fetching.
# Example: A runner without the approved Node `26.2.0` is stopped.
runtimeOnFail: error

########################################
# Lockfile and resolution discipline
########################################

# `lockfile`
# Simple: Enforces the use of a lockfile.
# Details: A Fortress repo never operates without a deterministic lockfile.
# Example: `false` would be an architectural error here.
lockfile: true

# `preferFrozenLockfile`
# Simple: Prefers headless, unchanged installations.
# Details: CI and regulated workflows should not resolve silently if the
# lockfile already describes the desired graph.
# Example: A manifest change without a lockfile update leads to an error.
preferFrozenLockfile: true

# `lockfileIncludeTarballUrl`
# Simple: Saves tarball sources directly in the lockfile.
# Details: This improves traceability and auditability of origin. In
# private repositories, this makes sense for Fortress governance.
# Example: The lockfile explicitly shows which artifact endpoint the package originates from.
lockfileIncludeTarballUrl: true

# `resolutionMode`
# Simple: Selects the PNPM resolution strategy.
# Details: `time-based` reduces the risk of subdependency hijacking because
# transitive updates remain tied in time to direct dependency releases.
# Example: A direct dep update only pulls in temporally matching subdeps.
resolutionMode: time-based

# `registrySupportsTimeField`
# Simple: Enables optimized time metadata support for compatible registries.
# Details: This value remains `false` until the internal mirror is proven to
# deliver the required `time` field.
# Example: Verdaccio or an internal proxy is only set to `true` after verification.
registrySupportsTimeField: false

# `saveExact`
# Simple: Saves newly added dependency versions as exact versions instead of ranges.
# Details: This prevents caret or tilde ranges from being written during `pnpm add`
# and keeps newly introduced dependencies pinned to an explicitly approved version.
# In combination with `saveWorkspaceProtocol` and `savePrefix: ""`, the saved spec
# remains explicit, non-drifting, and reviewable.
# Example: `pnpm add lodash@4.17.21` writes `4.17.21` instead of `^4.17.21`.
saveExact: true

# `savePrefix`
# Simple: Defines the version prefix for newly saved specs.
# Details: An empty string keeps the serialized spec prefix-free and reinforces
# the exact-version save policy established by `saveExact: true`.
# Example: `1.2.3` instead of `^1.2.3`.
savePrefix: ""

########################################
# Dependency layout and anti-hoisting
########################################

# `nodeLinker`
# Simple: Selects the installation model for Node dependencies.
# Details: `isolated` is the strictest general default choice for correct
# dependency isolation.
# Example: The project only sees declared dependencies.
nodeLinker: isolated

# `enableGlobalVirtualStore`
# Simple: Prevents cross-project global virtual store usage.
# Details: A Fortress policy avoids implicit cross-project sharing paths
# and the associated `NODE_PATH` complexity.
# Example: Dependencies are materialized project-locally rather than via a global virtual store.
enableGlobalVirtualStore: false

# `hoist`
# Simple: Disables hidden hoisting globally.
# Details: The Fortress baseline is no hoisting unless forced by concrete evidence to the contrary.
# Example: Undeclared dependencies remain inaccessible.
hoist: false

# `hoistPattern`
# Simple: Does not allow hoisting exceptions by default.
# Details: An empty array is the fail-closed baseline; exceptions are
# added later minimally and based on evidence.
# Example: Only after a validated tooling error is a single pattern included.
hoistPattern: []

# `publicHoistPattern`
# Simple: Prevents root-visible hoisting for application code.
# Details: This ensures phantom dependencies are not exported to the visible root path.
# Example: Application code cannot see an undeclared transitive dependency via the root.
publicHoistPattern: []

# `shamefullyHoist`
# Simple: Prevents blanket-wide public hoisting.
# Details: This setting always remains `false` in a Fortress architecture.
# Example: A flat root layout similar to npm/Yarn Classic is not created.
shamefullyHoist: false

# `virtualStoreDir`
# Simple: Sets the project-local virtual store path.
# Details: `.pnpm` shortens paths and makes the store path explicitly visible.
# Example: `node_modules/.pnpm` is relocated to `.pnpm`.
virtualStoreDir: .pnpm

# `virtualStoreDirMaxLength`
# Simple: Limits the length of directory names in the virtual store.
# Details: `60` is the conservative Windows-safe limit.
# Example: Very long package names are shortened in the store layout.
virtualStoreDirMaxLength: 60

# `verifyStoreIntegrity`
# Simple: Verifies store contents before linking.
# Details: Modified files in the content-addressable store are not silently accepted.
# Example: A tampered store artifact is caught during the integrity check.
verifyStoreIntegrity: true

# `strictStorePkgContentCheck`
# Simple: Verifies if name, version, and content match in the store.
# Details: This protects against registries that deliver identical content under different
# package identities.
# Example: An inconsistent store entry is not accepted.
strictStorePkgContentCheck: true

########################################
# Peer dependency governance
########################################

# `autoInstallPeers`
# Simple: Prevents automatic installation of missing peers.
# Details: Peer decisions must be made explicitly in the manifest.
# Example: A missing `react-dom` is not silently added.
autoInstallPeers: false

# `strictPeerDependencies`
# Simple: Makes peer conflicts hard instead of advisory.
# Details: This prevents runtime surprises caused by soft peer deviations.
# Example: An invalid peer tree leads directly to an error.
strictPeerDependencies: true

# `peerDependencyRules`
# Simple: Keeps blanket exceptions for peers closed.
# Details: Empty lists and maps mean: no general relaxation, no
# implicit approvals, no `allowAny` shortcut.
# Example: A later exception is only added selectively for a leaf->peer pair.
peerDependencyRules:
  ignoreMissing: []
  allowAny: []
  allowedVersions: {}

# `packageExtensions`
# Simple: Defines explicit local manifest patches for third-party packages.
# Details: The Fortress baseline keeps this map explicitly empty so that no
# hidden compatibility patching is applied without review.
# Example: `{}` means there are currently no approved manifest extensions.
packageExtensions: {}

# `overrides`
# Simple: Allows later, targeted transitive pins or removals.
# Details: Any later filling is a deliberately reviewed governance intervention.
# Example: `foo@1>bar: "-"` removes an unnecessary transitive package later.
#
# Project exception note:
# We only need local VSIX packaging via `@vscode/vsce`.
# We do NOT use publisher credential storage in this repository.
# Therefore, we remove the optional `keytar` dependency from the
# `@vscode/vsce@3.9.1` dependency graph.
overrides:
  "@vscode/vsce@3.9.1>keytar": "-"

# `ignoreCompatibilityDb`
# Simple: Disables implicit automatic manifest patches from the compatibility database.
# Details: This increases auditability because the repo is not silently influenced by
# external patch logic.
# Example: Missing dependency metadata must be deliberately handled via `packageExtensions`.
ignoreCompatibilityDb: true

# `updateNotifier`
# Simple: Disables automatic update notifications.
# Details: This reduces unplanned network/noise signals and keeps upgrades within the
# controlled governance process.
# Example: Contributors do not receive spontaneous pnpm upgrade notifications in daily work.
updateNotifier: false

# `catalogMode`
# Simple: Enforces that new dependencies cannot bypass the catalog.
# Details: `strict` makes the catalog the single source of truth even in a single-project repo.
# Example: `pnpm add lodash@latest` fails if `lodash` is not appropriately listed in the catalog.
catalogMode: strict

# `cleanupUnusedCatalogs`
# Simple: Cleans up unused catalog entries.
# Details: This reduces governance clutter and prevents obsolete approval remnants.
# Example: Removed packages do not remain as dead entries in the catalog.
cleanupUnusedCatalogs: true

########################################
# Script safety
########################################

# `enablePrePostScripts`
# Simple: Disables implicit `pre*`/`post*` hooks.
# Details: Script chaining should be explicit, not happen silently in the background.
# Example: `pnpm build` does not automatically execute `prebuild` and `postbuild`.
enablePrePostScripts: false

# `verifyDepsBeforeRun`
# Simple: Enforces up-to-date dependencies before `pnpm run` and `pnpm exec`.
# Details: `error` prevents working with stale `node_modules`.
# Example: After a manifest change, `pnpm test` blocks until install is run again.
verifyDepsBeforeRun: error

